name: build
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Prep
        run: |
          if (!(Test-Path "go.mod")) { go mod init mihomo-launcher }
          go mod tidy
      - name: Build
        run: go build -ldflags="-H windowsgui -s -w" -o mihomo-launcher.exe main.go
      - uses: actions/upload-artifact@v4
        with:
          name: mihomo-launcher
          path: mihomo-launcher.exe
