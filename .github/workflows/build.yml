name: Build Mihomo Launcher (Single File)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Prepare Dependencies
        shell: pwsh
        run: |
          if (Test-Path "go.mod") { Remove-Item "go.mod" -Force }
          if (Test-Path "go.sum") { Remove-Item "go.sum" -Force }
          go mod init mihomo-launcher
          go get github.com/getlantern/systray
          go get golang.org/x/sys/windows
          go mod tidy

      - name: Build Executable
        shell: pwsh
        run: |
          # 核心命令：-H windowsgui 彻底去除黑窗口
          # 图标此时已自动被嵌入 EXE 内部
          go build -ldflags="-s -w -H windowsgui" -o mihomo-launcher.exe main.go

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-launcher-standalone
          path: mihomo-launcher.exe
