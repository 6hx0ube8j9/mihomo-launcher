name: Build Launcher

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable' 
          cache: true   

      - name: Install dependencies
        run: |
          go mod init mihomo-launcher || true
          go mod tidy

      - name: Build EXE
        shell: pwsh
        run: |
          $env:CGO_ENABLED="0"
          go build -ldflags="-s -w -H windowsgui" -o mihomo-launcher.exe .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-launcher
          path: mihomo-launcher.exe
