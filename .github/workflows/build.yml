name: Build Mihomo Launcher

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Initialize Module
        shell: pwsh
        run: |
          # 确保在网页编译环境下初始化环境
          if (Test-Path "go.mod") { Remove-Item "go.mod" -Force }
          go mod init mihomo-launcher
          go get golang.org/x/sys/windows
          go mod tidy

      - name: Build Standalone EXE
        shell: pwsh
        run: |
          # -s -w 压缩体积, -H windowsgui 隐藏黑窗口
          go build -ldflags="-s -w -H windowsgui" -o mihomo-launcher.exe main.go

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-launcher-v26
          path: mihomo-launcher.exe
