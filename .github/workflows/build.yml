name: build
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Initialize Mod
        run: |
          if (!(Test-Path "go.mod")) {
            go mod init mihomo-launcher
          }
          go mod tidy

      - name: Build
        run: |
          go build -ldflags="-H windowsgui -s -w" -o mihomo-launcher.exe main.go

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-launcher
          path: mihomo-launcher.exe
