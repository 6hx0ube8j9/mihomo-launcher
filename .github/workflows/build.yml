name: Build Mihomo Launcher

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Prepare Dependencies
        shell: pwsh
        run: |
          # 彻底清理并重建依赖环境
          if (Test-Path "go.mod") { Remove-Item "go.mod" }
          if (Test-Path "go.sum") { Remove-Item "go.sum" }
          
          go mod init mihomo-launcher
          # 仅拉取必要的外部包
          go get github.com/getlantern/systray
          go get golang.org/x/sys/windows
          go mod tidy

      - name: Build Executable
        shell: pwsh
        run: |
          # -s -w: 压缩体积
          # -H windowsgui: 彻底消除启动时的黑框
          go build -ldflags="-s -w -H windowsgui" -o mihomo-launcher.exe main.go

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-launcher
          path: mihomo-launcher.exe
