name: Get Mod Content
on: workflow_dispatch 

jobs:
  get-content:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Generate
        shell: pwsh
        run: |
          go mod init mihomo-launcher
          go mod tidy
          Write-Host "---------- COPY START: GO.MOD ----------"
          Get-Content go.mod
          Write-Host "---------- COPY END: GO.MOD ----------"
          Write-Host "---------- COPY START: GO.SUM ----------"
          Get-Content go.sum
          Write-Host "---------- COPY END: GO.SUM ----------"
