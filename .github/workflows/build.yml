- name: Build Executable
        shell: pwsh
        run: |
          # 1. 确保在编译时路径正确
          # 2. -H windowsgui 确保没有黑窗口
          go build -ldflags="-s -w -H windowsgui" -o mihomo-launcher.exe main.go

      - name: Prepare Release Package
        shell: pwsh
        run: |
          # 创建发布目录
          New-Item -ItemType Directory -Force -Path "dist"
          
          # 拷贝编译好的 EXE
          Copy-Item "mihomo-launcher.exe" -Destination "dist\"
          
          # 拷贝图标文件夹（关键步骤：保持 V26 代码需要的相对路径）
          if (Test-Path "icons") {
              Copy-Item -Path "icons" -Destination "dist\" -Recurse -Force
              Write-Host "Icons directory copied successfully."
          } else {
              Write-Error "Icons directory NOT found! Check your repository structure."
              exit 1
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-launcher-package
          # 上传整个 dist 文件夹
          path: dist/
