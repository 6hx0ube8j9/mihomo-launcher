name: Build Launcher
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: '1.20'
      - name: Build
        run: |
          go mod init mihomo-launcher || echo "skip"
          go mod tidy
          go install github.com/akavel/rsrc@latest
          rsrc -ico icons/default.ico -o resource.syso
          go build -ldflags="-H windowsgui -s -w" -o mihomo-launcher.exe main.go
      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: launcher-only
          path: mihomo-launcher.exe
